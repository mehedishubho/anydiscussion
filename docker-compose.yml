# docker-compose.yml (repo root — D-19)
# Dev environment: Postgres 16 + MinIO (S3-compatible for R2 parity).
# Plans 02 and 03 consume these services independently in Wave 2.

services:
  # Primary dev database
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: anydiscussion
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Throwaway DB for clean-room migration test (FOUND-06) — no volume (ephemeral)
  postgres-test:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: anydiscussion_test

  # MinIO — local S3-compatible storage (R2 parity for dev)
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001" # MinIO console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
